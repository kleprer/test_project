name: deploy to pythonanywhere

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v3
    
    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: run tests
      run: |
        python manage.py test
    
    - name: check migrations
      run: |
        python manage.py makemigrations --check

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: checkout code
      uses: actions/checkout@v3
    
    - name: deploy to pythonanywhere
      env:
        API_TOKEN: ${{ secrets.PYTHONANYWHERE_TOKEN }}
        USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        DOMAIN: ${{ secrets.PYTHONANYWHERE_DOMAIN }}
      run: |
        curl -X POST \
          "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/$DOMAIN/reload/" \
          -H "Authorization: Token $API_TOKEN"
                
        curl -X POST \
          "https://$USERNAME:$API_TOKEN@www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/" \
          -d "executable=/bin/bash" \
          -d "arguments=-c 'cd ~/django-app && git pull && python3.11 manage.py migrate && python3.11 manage.py collectstatic --noinput'"